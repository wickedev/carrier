name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: build (linux)
        run: go build ./...
      - name: build (darwin cross)
        run: GOOS=darwin go build ./...
      - name: test (race)
        run: go test -race ./...
